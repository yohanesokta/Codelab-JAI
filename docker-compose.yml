services:
  db:
    image: mariadb:10.11
    restart: always
    env_file:
      - .env
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-root}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-coding_platform}
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      # Ini adalah kunci rahasianya: kita override localhost menjadi db khusus untuk di dalam container
      - DATABASE_URL=mysql://root:${MARIADB_ROOT_PASSWORD:-root}@db:3306/${MARIADB_DATABASE:-coding_platform}
    depends_on:
      - db

  shortlink:
    build:
      context: ./shortlink-service
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://root:${MARIADB_ROOT_PASSWORD:-root}@db:3306/${MARIADB_DATABASE:-coding_platform}
    depends_on:
      - db
    
volumes:
  mariadb_data:
